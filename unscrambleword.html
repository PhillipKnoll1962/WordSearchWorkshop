<div class="page-wrap">
<div class="app-card">
    <div class="header">
        <h1>Word Unscrambler</h1>
        <p class="subtitle">Instantly discover clean, valid English dictionary combinations</p>
    </div>
    
    <div class="status-container">
        <div id="statusDot" class="status-dot"></div>
        <span id="statusText">Connecting to server database...</span>
    </div>

    <label class="input-label" for="letterInput">SCRAMBLED LETTERS</label>
    <div class="input-group">
        <input type="text" id="letterInput" placeholder="OHTGUR" maxlength="15" autocomplete="off" disabled>
        <button id="unscrambleBtn" onclick="unscrambleWords()" disabled>Unscramble</button>
    </div>

    <div class="toggle-container">
        <label class="radio-label">
            <input type="radio" name="matchMode" value="exact" checked> Exact Anagrams Only
        </label>
        <label class="radio-label">
            <input type="radio" name="matchMode" value="subword"> Sub-words (Scrabble Style)
        </label>
    </div>

    <div id="resultsBox" class="results-box">
        <div class="results-header">
            <div id="resultsTitle" class="results-title"></div>
        </div>
        <ul id="wordGrid" class="word-grid"></ul>
    </div>
</div>
</div>

<script>
    let fullDictionary = [];

    window.addEventListener('DOMContentLoaded', () => {
        const dictionaryUrl = 'https://cdn.jsdelivr.net/gh/dwyl/english-words@master/words_alpha.txt';
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const letterInput = document.getElementById('letterInput');
        const unscrambleBtn = document.getElementById('unscrambleBtn');
        
        fetch(dictionaryUrl)
            .then(response => response.text())
            .then(text => {
                fullDictionary = text.split(/\r?\n/).map(word => word.trim().toLowerCase());
                
                statusDot.classList.add('ready');
                statusText.style.color = 'var(--text-main)';
                statusText.innerText = `Dictionary Connected (${fullDictionary.length.toLocaleString()} words loaded)`;
                letterInput.disabled = false;
                unscrambleBtn.disabled = false;
                letterInput.focus();
            })
            .catch(err => {
                console.error("Database connection failure:", err);
                statusText.style.color = '#ef4444';
                statusText.innerText = "Connection offline. Please check your network connection.";
            });
    });

    function sortLetters(word) {
        return word.toLowerCase().split('').sort().join('');
    }

    // Checks if target word can be completely formed from input letters subset
    function canFormWord(word, letters) {
        if (word.length > letters.length) return false;
        
        const letterCount = {};
        for (let l of letters.toLowerCase()) {
            letterCount[l] = (letterCount[l] || 0) + 1;
        }
        for (let l of word.toLowerCase()) {
            if (!letterCount[l]) return false;
            letterCount[l]--;
        }
        return true;
    }

    function unscrambleWords() {
        const input = document.getElementById('letterInput').value.trim().toLowerCase();
        const resultsBox = document.getElementById('resultsBox');
        const resultsTitle = document.getElementById('resultsTitle');
        const wordGrid = document.getElementById('wordGrid');
        const mode = document.querySelector('input[name="matchMode"]:checked').value;
        
        wordGrid.innerHTML = '';
        
        if (!input) {
            resultsBox.style.display = 'none';
            return;
        }

        const sortedInput = sortLetters(input);
        const matches = [];

        fullDictionary.forEach(word => {
            if (!word) return;
            
            if (mode === 'exact') {
                if (word.length === input.length && sortLetters(word) === sortedInput) {
                    matches.push(word);
                }
            } else {
                // Filter out single letters except 'a' and 'i' for better Scrabble results
                if (word.length === 1 && word !== 'a' && word !== 'i') return;
                
                if (canFormWord(word, input)) {
                    matches.push(word);
                }
            }
        });

        // Sort sub-words by length descending, then alphabetically
        if (mode === 'subword') {
            matches.sort((a, b) => b.length - a.length || a.localeCompare(b));
        } else {
            matches.sort();
        }

        resultsBox.style.display = 'block';
        if (matches.length > 0) {
            resultsTitle.innerText = `Results (${matches.length} found):`;
            matches.forEach(word => {
                const li = document.createElement('li');
                li.className = 'word-item';
                li.innerText = word.toUpperCase();
                wordGrid.appendChild(li);
            });
        } else {
            resultsTitle.innerHTML = '<div class="no-results">No dictionary terms matched those criteria.</div>';
        }
    }

    document.getElementById('letterInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !this.disabled) {
            unscrambleWords();
        }
    });
</script>
