<script>
    const recordBtn = document.getElementById('recordBtn');
    const statusDiv = document.getElementById('status');
    
    let mediaRecorder;
    let audioChunks = [];

    recordBtn.addEventListener('click', async () => {
        statusDiv.className = '';
        statusDiv.innerText = '';
        audioChunks = [];
        
        try {
            // Request microphone access
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                // Create a standard audio file blob
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                await uploadAndAnalyze(audioBlob);
            };

            mediaRecorder.start();
            recordBtn.disabled = true;
            
            let secondsLeft = 5;
            statusDiv.className = 'recording';
            statusDiv.innerText = `🔴 Recording... Listening for ${secondsLeft}s`;
            
            const interval = setInterval(() => {
                secondsLeft--;
                if (secondsLeft > 0) {
                    statusDiv.innerText = `🔴 Recording... Listening for ${secondsLeft}s`;
                } else {
                    clearInterval(interval);
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop());
                    statusDiv.className = '';
                    statusDiv.innerText = '⚙️ Analyzing audio snippet...';
                }
            }, 1000);

        } catch (err) {
            statusDiv.className = 'error';
            statusDiv.innerText = `❌ Microphone access denied or missing.`;
            recordBtn.disabled = false;
        }
    });

    async function uploadAndAnalyze(audioBlob) {
        // Create a standard form upload payload
        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.wav');
        
        // Cornell's required settings parameters
        formData.append('latitude', '42.5');
        formData.append('longitude', '-76.5');
        formData.append('week', '23');
        formData.append('threshold', '0.3');

        // Direct connection to Cornell's public analysis engine
        const targetUrl = 'https://birdnet.cornell.edu/api/v1/analyze';

        try {
            const response = await fetch(targetUrl, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error();

            const data = await response.json();
            
            if (data.results && data.results.length > 0) {
                const topMatch = data.results[0];
                const confidence = Math.round(topMatch.score * 100);
                statusDiv.className = 'success';
                statusDiv.innerHTML = `🎯 <b>Match Found:</b> ${topMatch.species} (${confidence}% match)`;
            } else {
                statusDiv.className = '';
                statusDiv.innerText = '🤔 No bird species recognized. Try again closer to the sound!';
            }
        } catch (error) {
            statusDiv.className = 'error';
            statusDiv.innerText = `❌ Connection Error: Cornell server rejected the request format.`;
        } finally {
            recordBtn.disabled = false;
        }
    }
</script>
