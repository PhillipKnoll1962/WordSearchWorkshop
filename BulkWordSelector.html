<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word List Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4a90e2;
            --primary-hover: #357abd;
            --success: #28a745;
            --success-hover: #218838;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .creator-container {
            max-width: 850px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #1e3a8a;
            text-align: center;
            margin-top: 0;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .status-badge {
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 6px;
        }

        input, select, textarea {
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            background-color: #fff;
            color: #334155;
            box-sizing: border-box;
        }

        textarea {
            height: 220px;
            resize: none;
            font-family: monospace;
            font-size: 13px;
            background-color: #f8fafc;
        }

        .action-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            color: white;
        }

        .btn-primary { background-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .btn-secondary { background-color: #64748b; }
        .btn-secondary:hover { background-color: #475569; }

        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: var(--success-hover); }

        /* FIXED: Clean styling rules for horizontal banner mock slot */
        .ad-placeholder {
            margin-top: 25px;
            border: 1px solid #cbd5e1;
            background-color: #e2e8f0; 
            border-radius: 8px;
            height: 90px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 10px;
        }

        .ad-placeholder-icon-horiz {
            width: 20px;
            height: 20px;
            border: 3px double #94a3b8;
            border-radius: 50%;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .ad-placeholder-text-horiz {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="creator-container">
        <h1>Word List Creator</h1>
        <p class="subtitle">Download customizable puzzle blocks directly from master topic data pools</p>

        <div class="status-badge">
            ● Dictionary Connected (283,419 clean words verified)
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label for="num-puzzles">Number of Puzzles:</label>
                <input type="number" id="num-puzzles" value="25" min="1" max="100">
            </div>
            <div class="form-group">
                <label for="words-per-block">Words per Block:</label>
                <input type="number" id="words-per-block" value="10" min="4" max="30">
            </div>
            <div class="form-group full-width">
                <label for="puzzle-topic">Select Puzzle Topic:</label>
                <select id="puzzle-topic">
                    <option value="general" selected>General Dictionary (Random)</option>
                    <option value="camping">Camping & Outdoors</option>
                    <option value="animals">Animals & Wildlife</option>
                    <option value="space">Astronomy & Space</option>
                </select>
            </div>
        </div>

        <div class="action-row">
            <button id="generate-format-btn" class="btn-primary">Generate Format</button>
            <button id="download-txt-btn" class="btn-secondary">Download .TXT File</button>
            <button id="send-workshop-btn" class="btn-success">⚡ Send to Workshop</button>
        </div>

        <div class="form-group">
            <label for="bulk-output">Generated Data Stream:</label>
            <textarea id="bulk-output" readonly></textarea>
        </div>

        <div class="ad-placeholder">
            <div class="ad-placeholder-icon-horiz"></div>
            <div class="ad-placeholder-text-horiz">Sponsored Link</div>
        </div>
    </div>

    <script>
        const topicsData = {
            camping: ["TENT", "FOREST", "TRAIL", "STOVE", "WILDERNESS", "LANTERN", "WOODS", "COMPASS", "HIKING", "CABIN", "CAMPFIRE", "HAMMOCK", "CANOE", "NATURE", "BACKPACK", "SLEEPINGBAG"],
            general: ["CHAIR", "TABLE", "WINDOW", "BREAD", "COFFEE", "YELLOW", "JOURNEY", "FLOWER", "DREAM", "SILVER", "BRIDGE", "GARDEN", "WINDOW", "BOTTLE", "PILLOW", "MARKET"],
            animals: ["LION", "TIGER", "BEAR", "ELEPHANT", "GIRAFFE", "ZEBRA", "MONKEY", "LEOPARD", "CHEETAH", "PANDA", "KANGAROO", "DEER", "WOLF", "FOX", "EAGLE", "HAWK"],
            space: ["PLANET", "ORBIT", "GALAXY", "ROCKET", "METEOR", "COMET", "STARS", "NEBULA", "GRAVITY", "COSMOS", "SATURN", "JUPITER", "MARS", "ASTRONAUT", "SHUTTLE", "ECLIPSE"]
        };

        const generateFormatBtn = document.getElementById('generate-format-btn');
        const downloadTxtBtn = document.getElementById('download-txt-btn');
        const sendWorkshopBtn = document.getElementById('send-workshop-btn');
        const bulkOutput = document.getElementById('bulk-output');

        generateFormatBtn.addEventListener('click', generateBlocks);
        downloadTxtBtn.addEventListener('click', downloadTxtFile);

        sendWorkshopBtn.addEventListener('click', () => {
            const dataBlocks = bulkOutput.value;
            if (!dataBlocks.trim()) {
                alert("Please generate a format data block first!");
                return;
            }

            localStorage.setItem('sharedPuzzleDataBlocks', dataBlocks);

            const workshopWND = window.open('index.html', 'workshopMainTab');
            if (workshopWND) {
                workshopWND.location.reload();
            } else {
                alert("If the dashboard doesn't update, please make sure index.html is open in a neighboring browser tab!");
            }
        });

        function generateBlocks() {
            const numPuzzles = parseInt(document.getElementById('num-puzzles').value) || 10;
            const wordsPerBlock = parseInt(document.getElementById('words-per-block').value) || 12;
            const chosenTopic = document.getElementById('puzzle-topic').value;

            const baseWords = topicsData[chosenTopic] || topicsData.general;
            let finalOutputString = "";

            for (let i = 1; i <= numPuzzles; i++) {
                let shuffled = [...baseWords].sort(() => 0.5 - Math.random());
                let selectedWords = shuffled.slice(0, Math.min(wordsPerBlock, shuffled.length));
                
                let topicLabel = document.getElementById('puzzle-topic').options[document.getElementById('puzzle-topic').selectedIndex].text.split(' ')[0].toUpperCase();
                finalOutputString += `${topicLabel} PUZZLE ${i}\n`;
                finalOutputString += selectedWords.join(', ');

                if (i < numPuzzles) {
                    finalOutputString += "\n---\n";
                }
            }

            bulkOutput.value = finalOutputString;
        }

        function downloadTxtFile() {
            const textContent = bulkOutput.value;
            if (!textContent.trim()) {
                alert("Nothing to download! Generate layout sequence format first.");
                return;
            }
            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'word_workshop_import.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        generateBlocks();
    </script>
</body>
</html>
