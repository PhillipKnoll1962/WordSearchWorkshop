<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shazam for Birds 🐦</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 { color: #1e3c72; margin-top: 0; }
        p { color: #666; font-size: 0.95rem; margin-bottom: 2rem; }
        .btn {
            background: #2a75d3; color: white; border: none; padding: 12px 28px;
            font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(42, 117, 211, 0.4); transition: all 0.2s ease;
        }
        .btn:hover { background: #1b5cb3; transform: translateY(-1px); }
        .btn:disabled { background: #a0aec0; box-shadow: none; cursor: not-allowed; }
        #status { margin-top: 1.5rem; font-weight: 500; font-size: 0.95rem; line-height: 1.4; }
        .success { color: #2f855a; }
        .error { color: #c53030; }
        .recording { color: #dd6b20; }
    </style>
</head>
<body>

<div class="card">
    <h2>Shazam for Birds 🦜</h2>
    <p>Record a bird sound to identify the exact species using AI.</p>
    
    <button id="recordBtn" class="btn">🎤 Record & Identify (5s)</button>
    
    <div id="status"></div>
</div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const statusDiv = document.getElementById('status');
    
    let audioContext;
    let microphone;
    let processor;
    let audioBuffer = [];
    let sampleRate = 0;

    recordBtn.addEventListener('click', async () => {
        statusDiv.className = '';
        statusDiv.innerText = '';
        audioBuffer = [];
        recordBtn.disabled = true;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            sampleRate = audioContext.sampleRate;
            microphone = audioContext.createMediaStreamSource(stream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);
            
            processor.onaudioprocess = (e) => {
                const inputData = e.inputBuffer.getChannelData(0);
                audioBuffer.push(new Float32Array(inputData));
            };
            
            microphone.connect(processor);
            processor.connect(audioContext.destination);

            let secondsLeft = 5;
            statusDiv.className = 'recording';
            statusDiv.innerText = `🔴 Recording... Listening for ${secondsLeft}s`;
            
            const interval = setInterval(async () => {
                secondsLeft--;
                if (secondsLeft > 0) {
                    statusDiv.innerText = `🔴 Recording... Listening for ${secondsLeft}s`;
                } else {
                    clearInterval(interval);
                    
                    processor.disconnect();
                    microphone.disconnect();
                    stream.getTracks().forEach(track => track.stop());
                    audioContext.close();
                    
                    statusDiv.className = '';
                    statusDiv.innerText = '⚙️ Encoding real 16-bit WAV file...';
                    
                    const flatBuffer = flattenBuffer(audioBuffer);
                    const wavBlob = createWavBlob(flatBuffer, sampleRate);
                    
                    statusDiv.innerText = '⚙️ Querying open-source database...';
                    
                    const reader = new FileReader();
                    reader.readAsDataURL(wavBlob);
                    reader.onloadend = async () => {
                        const base64Audio = reader.result.split(',')[1];
                        await uploadAndAnalyze(base64Audio);
                    };
                }
            }, 1000);

        } catch (err) {
            statusDiv.className = 'error';
            statusDiv.innerText = `❌ Microphone access denied or missing.`;
            recordBtn.disabled = false;
        }
    });

    function flattenBuffer(chunks) {
        let totalLength = chunks.reduce((acc, chunk) => acc + chunk.length, 0);
        let result = new Float32Array(totalLength);
        let offset = 0;
        for (let chunk of chunks) {
            result.set(chunk, offset);
            offset += chunk.length;
        }
        return result;
    }

    function createWavBlob(samples, sampleRate) {
        let buffer = new ArrayBuffer(44 + samples.length * 2);
        let view = new DataView(buffer);
        
        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + samples.length * 2, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(view, 36, 'data');
        view.setUint32(40, samples.length * 2, true);
        
        let offset = 44;
        for (let i = 0; i < samples.length; i++, offset += 2) {
            let s = Math.max(-1, Math.min(1, samples[i]));
            view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        
        return new Blob([view], { type: 'audio/wav' });
    }

    function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    }

    async function uploadAndAnalyze(base64Data) {
        // Formatted precisely for the Hugging Face Gradio audio element structure
        const payload = {
            data: [
                {
                    "path": "recording.wav",
                    "meta": { "_type": "gradio.FileData" },
                    "data": "data:audio/wav;base64," + base64Data
                }
            ]
        };

        const targetUrl = 'https://tomaarsen-birdnet-sound-analysis.hf.space/api/predict';

        try {
            const response = await fetch(targetUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error();

            const data = await response.json();
            
            if (data.data && data.data[0]) {
                const results = data.data[0];
                if (results.confidences && results.confidences.length > 0) {
                    const topMatch = results.confidences[0];
                    const matchName = topMatch.label;
                    const matchConf = Math.round(topMatch.confidence * 100);
                    
                    statusDiv.className = 'success';
                    statusDiv.innerHTML = `🎯 <b>Match Found:</b><br>${matchName} (${matchConf}% match)`;
                    return;
                }
            }
            
            statusDiv.className = '';
            statusDiv.innerText = '🤔 No matching bird species detected. Try getting a closer recording!';
            
        } catch (error) {
            statusDiv.className = 'error';
            statusDiv.innerText = `❌ Error: Cloud analysis database rejected the audio layout.`;
        } finally {
            recordBtn.disabled = false;
        }
    }
</script>

</body>
</html>
